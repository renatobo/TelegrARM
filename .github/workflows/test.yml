name: Tests and Coding Standards

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ "8.0", "8.2", "8.5" ]
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Run unit tests
        run: |
          chmod +x scripts/phpunit
          ./scripts/phpunit

  coding-standards:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer, phpcs
          coverage: none
      - name: Install WordPress Coding Standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction wp-coding-standards/wpcs dealerdirect/phpcodesniffer-composer-installer
      - name: Run PHPCS
        run: phpcs --standard=phpcs.xml.dist

  package:
    name: Validate release package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and inspect package
        run: |
          chmod +x build.sh scripts/validate-package
          ZIP_PATH="$(./build.sh | sed -n 's/^Created //p')"
          ./scripts/validate-package "$ZIP_PATH"

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        run: shellcheck build.sh release.sh scripts/phpunit scripts/psalm scripts/validate-package
